# Codex project configuration for EACF Knowledge Base
#
# Tells Codex to also load AGENTS_BOOT.md as a fallback instruction source
# at each directory level (in addition to AGENTS.md).
# This allows AGENTS_BOOT.md to serve as the single source of truth for
# EACF agent instructions across all agent platforms.

project_doc_fallback_filenames = ["AGENTS_BOOT.md"]

# Raise the byte limit to accommodate the full AGENTS_BOOT.md content
project_doc_max_bytes = 65536
